# The real Secret is NEVER committed (it holds the TokenRouter key).
# Create it from your local ai-service/.env instead:
#
#   kubectl -n terramind create secret generic terramind-ai-secret \
#     --from-literal=TOKENROUTER_API_KEY="$(grep ^TOKENROUTER_API_KEY ai-service/.env | cut -d= -f2)"
#
# In the Vault phase this Secret is replaced by a Vault Agent injection.
apiVersion: v1
kind: Secret
metadata:
  name: terramind-ai-secret
  namespace: terramind
type: Opaque
stringData:
  TOKENROUTER_API_KEY: "sk-your-tokenrouter-key-here"
