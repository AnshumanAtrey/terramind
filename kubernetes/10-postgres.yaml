# PostgreSQL — operational datastore for watch markers and the AI detection log.
# Demo credentials only; in a real deployment these come from Vault.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: terramind
type: Opaque
stringData:
  POSTGRES_USER: terramind
  POSTGRES_PASSWORD: terramind
  POSTGRES_DB: terramind
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: terramind
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: terramind
  labels: { app: postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef: { name: postgres-secret }
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "terramind"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "terramind"] }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: terramind
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
