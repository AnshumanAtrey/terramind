# Next.js command console. NEXT_PUBLIC_API_URL is baked at image-build time
# (--build-arg) to the ingress origin, so the browser reaches the backend at /api.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: terramind
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: terramind-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 300m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: terramind
spec:
  selector: { app: frontend }
  ports:
    - port: 3000
      targetPort: 3000
