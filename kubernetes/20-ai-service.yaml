# AI inference service — MiniMax-M3 vision. The TokenRouter key comes from the
# `terramind-ai-secret` Secret (created out-of-band; see secret.example.yaml).
# In the Vault phase this Secret is replaced by a Vault Agent injection.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-config
  namespace: terramind
data:
  TOKENROUTER_BASE_URL: "https://api.tokenrouter.com/v1"
  AI_MODEL: "MiniMax-M3"
  AI_TIMEOUT_SEC: "45"
  AI_FORCE_MOCK: "false"
  IMAGE_DIR: "/app/demo-imagery"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: terramind
  labels: { app: ai-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ai-service }
  template:
    metadata:
      labels: { app: ai-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ai-service
          image: terramind-ai-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef: { name: ai-config }
          env:
            - name: TOKENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: terramind-ai-secret
                  key: TOKENROUTER_API_KEY
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 384Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: terramind
spec:
  selector: { app: ai-service }
  ports:
    - port: 8001
      targetPort: 8001
---
# Scales on "threat surge" — more imagery to analyze drives CPU up → more replicas.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: terramind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
