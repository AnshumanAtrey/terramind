# Command backend — swarm simulation + AI scan loop + Prometheus metrics.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: terramind
data:
  DATABASE_URL: "postgresql+psycopg2://terramind:terramind@postgres:5432/terramind"
  AI_SERVICE_URL: "http://ai-service:8001"
  SCAN_INTERVAL_SEC: "20"
  AO_CODENAME: "AO TRIDENT"
  CORS_ORIGINS: "*"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: terramind
  labels: { app: backend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: backend
          image: terramind-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: backend-config }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 384Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: terramind
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
# NOTE: the backend holds the authoritative swarm state in memory, so it is a
# SINGLETON coordinator (replicas: 1) — it is intentionally not autoscaled.
# Horizontal autoscaling lives on the stateless ai-service (see 20-ai-service.yaml),
# which is the correct "scale on imagery/threat surge" workload.
