name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate

  kubernetes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          ./kubeconform -strict -summary -ignore-missing-schemas -kubernetes-version 1.30.0 kubernetes/*.yaml

  json-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate grafana dashboard + yaml
        run: |
          python -c "import json; json.load(open('monitoring/grafana-dashboard.json')); print('grafana dashboard JSON ok')"
          pip install --quiet pyyaml
          python - <<'PY'
          import glob, yaml
          for f in glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True):
              list(yaml.safe_load_all(open(f)))
          print("all yaml parses")
          PY

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build images (proof they build)
        run: |
          docker build -t terramind-ai-service:ci ./ai-service
          docker build -t terramind-backend:ci ./backend
          docker build --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080 -t terramind-frontend:ci ./frontend
