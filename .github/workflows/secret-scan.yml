name: secret-scan

# Fails the pipeline if a secret (API key, token, private key) is committed.
# Live demo: leak a key in a code comment, push → this job turns RED and points at
# the exact file + line. Remove the line, push again → GREEN. This is the
# "cyberattack / secret leakage" failure the PS124 reviewers may simulate.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan the tree for committed secrets (gitleaks)
        run: |
          V=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          # --no-git scans the checked-out files (tracked only on a CI checkout);
          # --exit-code 1 makes a finding FAIL the job (red ✗).
          ./gitleaks detect --no-git --source . --config .gitleaks.toml --redact -v --exit-code 1
