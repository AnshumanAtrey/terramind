# Kibana — UI for exploring the TerraMind logs in Elasticsearch.
#   helm install kibana elastic/kibana -n logging -f logging/kibana-values.yaml

elasticsearchHosts: "http://elasticsearch-master:9200"

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    memory: "1Gi"

service:
  type: ClusterIP
  port: 5601

# reach it with: kubectl -n logging port-forward svc/kibana-kibana 5601:5601
